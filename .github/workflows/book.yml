name: Build book PDF and publish release

on:
  push:
    branches: [main]
    paths:
      - 'book/**'
      - '.github/workflows/book.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: book
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile screen edition (A4, English)
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: book
          root_file: screen.tex
          latexmk_use_lualatex: false

      - name: Compile print edition (7x10 in, English)
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: book
          root_file: print.tex
          latexmk_use_lualatex: false

      - name: Compile screen edition (A4, Spanish)
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: book
          root_file: screen-es.tex
          latexmk_use_lualatex: false

      - name: Compile print edition (7x10 in, Spanish)
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: book
          root_file: print-es.tex
          latexmk_use_lualatex: false

      - name: Rename PDFs
        run: |
          cd book
          mv screen.pdf geometric-deep-learning.pdf
          mv print.pdf geometric-deep-learning-print.pdf
          mv screen-es.pdf geometric-deep-learning-es.pdf
          mv print-es.pdf geometric-deep-learning-print-es.pdf
          ls -la *.pdf

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: book-latest
          name: Latest book build
          body: >-
            Automatically built PDFs of the book.
            `geometric-deep-learning.pdf` is the A4 screen edition (English);
            `geometric-deep-learning-print.pdf` is the 7×10 in print edition (English);
            `geometric-deep-learning-es.pdf` is the A4 screen edition (Spanish);
            `geometric-deep-learning-print-es.pdf` is the 7×10 in print edition (Spanish).
          make_latest: true
          files: |
            book/geometric-deep-learning.pdf
            book/geometric-deep-learning-print.pdf
            book/geometric-deep-learning-es.pdf
            book/geometric-deep-learning-print-es.pdf
