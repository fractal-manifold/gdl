name: Build book PDFs and publish dated release

on:
  push:
    branches: [main]
    paths:
      - 'book/**'
      - 'portada.jpg'
      - '.github/workflows/book.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: book
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Full TeX Live (latexmk + all packages used: algorithm, algpseudocode,
    # contour, eso-pic, pdfrender, ...). The Makefile is the single source of
    # truth for how the PDFs and KDP covers are built.
    container: texlive/texlive:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools (ImageMagick, pdfinfo, make, Python figure deps)
        run: |
          apt-get update
          apt-get install -y --no-install-recommends make gawk imagemagick poppler-utils \
            python3 python3-numpy python3-scipy python3-matplotlib python3-networkx

      - name: Date stamp
        id: date
        run: echo "date=$(date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Build all editions + covers into out/
        run: make -C book dist

      - name: Publish dated GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: book-${{ steps.date.outputs.date }}
          name: Geometric Deep Learning — ${{ steps.date.outputs.date }}
          body: >-
            Book PDFs built on ${{ steps.date.outputs.date }}.
            `geometric-deep-learning.pdf` — A4 reading edition (English);
            `geometric-deep-learning-print.pdf` — 7×10 in print edition (English);
            `geometric-deep-learning-es.pdf` — A4 reading edition (Spanish);
            `geometric-deep-learning-print-es.pdf` — 7×10 in print edition (Spanish);
            `geometric-deep-learning-cover.pdf` / `-cover-es.pdf` — KDP wraparound covers.
          make_latest: true
          files: out/*.pdf
